<body>
<div class="wrap wide org-page">
<div class="org-top"><nav class="crumb"><a href="../browse.html">CRIMENET</a> / <span>Pregnant Alley</span></nav><h1>Pregnant Alley</h1><div class="org-meta"><span class="org-status-unknown"><span class="org-dot"></span>Status unknown</span><span class="org-meta-srcs"><span class="org-meta-srcs-lbl">Mentioned in</span><a class="src-pill" href="https://en.wikipedia.org/w/index.php?title=List_of_gangs_in_Belize&amp;oldid=1355341752" target="_blank" rel="noopener nofollow">List of gangs in Belize</a></span></div><p class="note">This organization is referenced in other articles but does not have its own dedicated profile.</p></div><section class="cc-panel"><h2 class="section-h">Trace a connection</h2><div class="panel-scroll"><section class="finder" id="finder" data-base="../" data-locked="Pregnant Alley"><div class="finder-row"><div class="pf-field pf-locked"><span class="pf-lock-lbl">From</span><span class="pf-lock-name">Pregnant Alley</span></div><span class="pf-arrow">→</span><div class="pf-field"><input type="text" id="pf-b" class="pf-input" placeholder="Organization B…" autocomplete="off" spellcheck="false"><div class="pf-dd" id="pf-dd-b"></div></div><button type="button" class="pf-go" id="pf-go">Trace</button><button type="button" class="pf-reset" id="pf-reset" hidden>Clear</button></div><div class="finder-results" id="pf-results"></div></section></div></section><script>
(function(){
  var F=document.getElementById('finder'); if(!F)return;
  var BASE=F.dataset.base||'', LOCKED=F.dataset.locked||'';
  var EVIDENCE_DIR=BASE+'evidence', EVIDENCE_BUCKETS=128;
  var PATH_MAX_HOPS=2, PATH_CAP=150;
  var adjNeighbors={}, adjRel={}, adjReady=false;
  var orgADJ={}, evidenceCache={}, bucketPromises={};
  var pfCurrentPaths=[], names=[], A=null, B=null;
  var elA=document.getElementById('pf-a'), elB=document.getElementById('pf-b'),
      go=document.getElementById('pf-go'), reset=document.getElementById('pf-reset'),
      out=document.getElementById('pf-results');
  function escHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
  function fold(s){return (s||'').normalize('NFKD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();}
  function titleFromUrl(url){if(!url)return 'Wikipedia';try{var u=new URL(url),m=u.searchParams.get('title');if(m)return decodeURIComponent(m.replace(/_/g,' '));var p=u.pathname.split('/wiki/')[1];if(p)return decodeURIComponent(p.split('?')[0].split('#')[0].replace(/_/g,' '));}catch(e){}return 'Wikipedia';}
  var SPINNER_SVG='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="4.93" x2="19.07" y2="7.76"></line></svg>';

  // Relationship taxonomy + colors — verbatim from the CRIMENET app.
  var EDGE_META={cooperation:{label:'Cooperation',family:'coop'},conflict:{label:'Conflict',family:'hostile'},other:{label:'Other',family:'loose'}};
  function edgeMeta(t){return EDGE_META[t]||{label:(t||'related').replace(/_/g,' '),family:'loose'};}
  var FAMILY_COLOR={coop:'var(--fam-coop)',hostile:'var(--fam-hostile)',loose:'var(--fam-loose)'};

  // ── evidence shards (FNV-1a bucket hash — identical to build_evidence_shards.py) ──
  function evidenceBucketId(name){var b=new TextEncoder().encode(name),h=0x811c9dc5;for(var i=0;i<b.length;i++){h^=b[i];h=Math.imul(h,0x01000193)>>>0;}var w=Math.max(3,String(EVIDENCE_BUCKETS-1).length);return String((h>>>0)%EVIDENCE_BUCKETS).padStart(w,'0');}
  function loadEvidence(orgName){
    if(orgName in evidenceCache)return Promise.resolve(evidenceCache[orgName]);
    var id=evidenceBucketId(orgName);
    if(!bucketPromises[id])bucketPromises[id]=fetch(EVIDENCE_DIR+'/'+id+'.json').then(function(r){if(!r.ok)throw new Error('bucket '+id);return r.json();}).catch(function(){return {};});
    return bucketPromises[id].then(function(bk){var e=bk[orgName]||null;evidenceCache[orgName]=e;return e;});
  }
  function fetchConnections(orgName){
    if(orgADJ[orgName])return Promise.resolve();
    return loadEvidence(orgName).then(function(entry){
      var edges=(entry&&entry.edges)?entry.edges:[];
      orgADJ[orgName]=[];
      edges.forEach(function(e){var other=(e.source===orgName)?e.target:e.source;orgADJ[orgName].push(Object.assign({},e,{_other:other}));});
    });
  }

  // ── topology (crimenet_adj.json) + BFS/DFS — verbatim from the CRIMENET app ──
  function bfsDistances(target){var dist=new Map();if(!adjNeighbors[target])return dist;dist.set(target,0);var fr=[target];while(fr.length){var nx=[];for(var i=0;i<fr.length;i++){var u=fr[i],d=dist.get(u),nbs=adjNeighbors[u];if(!nbs)continue;for(var j=0;j<nbs.length;j++){var v=nbs[j];if(!dist.has(v)){dist.set(v,d+1);nx.push(v);}}}fr=nx;}return dist;}
  function findPaths(a,b,maxHops,minHops,cap){
    minHops=minHops||2;cap=cap||PATH_CAP;var outp=[];
    if(!adjReady||a===b||!adjNeighbors[a]||!adjNeighbors[b])return {paths:outp,shortest:null,truncated:false};
    var distB=bfsDistances(b),shortest=distB.has(a)?distB.get(a):null;
    if(shortest===null||shortest>maxHops)return {paths:outp,shortest:shortest,truncated:false};
    var visited=new Set([a]),path=[a],truncated=false;
    (function dfs(u,remaining){
      if(outp.length>=cap){truncated=true;return;}
      var nbs=adjNeighbors[u]||[];
      for(var i=0;i<nbs.length;i++){
        if(outp.length>=cap){truncated=true;return;}
        var v=nbs[i];if(visited.has(v))continue;
        var dv=distB.get(v);if(dv===undefined||dv>remaining-1)continue;
        path.push(v);
        if(v===b){if(path.length-1>=minHops)outp.push(path.slice());}
        else if(remaining-1>=1){visited.add(v);dfs(v,remaining-1);visited.delete(v);}
        path.pop();
      }
    })(a,maxHops);
    outp.sort(function(p,q){return p.length-q.length||p.join('>').localeCompare(q.join('>'));});
    return {paths:outp,shortest:shortest,truncated:truncated};
  }

  // ── evidence rendering — verbatim from the CRIMENET app ──
  function renderEdgeContent(edges){
    var byRel={},relOrder=[];
    edges.forEach(function(e){var rel=e.relationship||'other';if(!byRel[rel]){byRel[rel]=[];relOrder.push(rel);}byRel[rel].push(e);});
    var html='<div style="display:flex; flex-direction:column; gap:16px;">';
    relOrder.forEach(function(rel){
      var groupEdges=byRel[rel],meta=edgeMeta(rel),color=FAMILY_COLOR[meta.family]||FAMILY_COLOR.loose;
      html+='<div style="border-left:2px solid '+color+'; padding-left:14px; margin-left:2px;">';
      html+='<div style="display:inline-block; font-size:13px; font-weight:800; color:'+color+'; background:rgba(0,0,0,0.5); border:1px solid rgba(0,0,0,0.8); padding:5px 10px; border-radius:4px; text-transform:uppercase; margin-bottom:10px; letter-spacing:1.2px;">'+escHtml(meta.label)+'</div>';
      html+=renderRelationshipGroup(groupEdges);
      html+='</div>';
    });
    html+='</div>';return html;
  }
  function renderRelationshipGroup(edges){
    if(!edges||!edges.length)return '';
    var res='<ul class="np-rel-desc" style="list-style:none; padding:0; margin:0 0 8px 0; font-size:16px;">';
    edges.forEach(function(e,i){
      var isLast=i===edges.length-1,border=isLast?'':'border-bottom:1px dashed var(--b1);';
      var descs=(Array.isArray(e.descriptions)?e.descriptions:(e.descriptions?[e.descriptions]:[])).filter(Boolean);
      var descHtml=descs.length?descs.map(function(d){return escHtml(d);}).join('<br>'):'<em style="color:var(--text-muted);">No description extracted.</em>';
      var sources=(Array.isArray(e.source_urls)?e.source_urls:(e.source_urls?[e.source_urls]:[])).filter(Boolean);
      var times=(Array.isArray(e.time_periods)?e.time_periods:(e.time_periods?[e.time_periods]:[])).map(function(t){return String(t).trim();}).filter(function(t){return t&&t.toLowerCase()!=='unknown';});
      var quotes=(Array.isArray(e.evidence_quote)?e.evidence_quote:(e.evidence_quote?[e.evidence_quote]:[])).map(function(q){return String(q).trim();}).filter(Boolean);
      var rid='ev'+Math.random().toString(36).slice(2,9);
      var pills=sources.map(function(u){return '<a href="'+escHtml(u)+'" target="_blank" rel="noopener" class="ev-pill src" title="'+escHtml(titleFromUrl(u))+'">Source</a>';}).join('');
      pills+='<button type="button" class="ev-pill time" onclick="pfToggleEv(\''+rid+'\',\'time\',this)">Time</button>';
      pills+='<button type="button" class="ev-pill quote" onclick="pfToggleEv(\''+rid+'\',\'quote\',this)">Quote</button>';
      var timeBlock='<div class="ev-reveal-block time" data-kind="time" style="display:none;"><span class="erl">Time Period</span>'+(times.length?times.map(function(t){return escHtml(t);}).join(' · '):'<span class="muted">Period not specified in the source.</span>')+'</div>';
      var quoteBlock='<div class="ev-reveal-block quote" data-kind="quote" style="display:none;"><span class="erl">Verbatim Evidence</span>'+(quotes.length?quotes.map(function(q){return '<span class="qt">'+escHtml(q)+'</span>';}).join(''):'<span class="muted">No verbatim quote recorded.</span>')+'</div>';
      res+='<li style="margin-bottom:10px; padding-bottom:10px; '+border+'"><div style="display:flex; align-items:flex-start; gap:10px; flex-wrap:wrap;"><span style="flex:1; min-width:180px;">'+descHtml+'</span><span class="ev-pills">'+pills+'</span></div><div id="'+rid+'" class="ev-reveal">'+timeBlock+quoteBlock+'</div></li>';
    });
    res+='</ul>';return res;
  }
  window.pfToggleEv=function(rid,kind,btn){
    var wrap=document.getElementById(rid);if(!wrap)return;
    var block=wrap.querySelector('.ev-reveal-block[data-kind="'+kind+'"]');if(!block)return;
    var showing=block.style.display!=='none';block.style.display=showing?'none':'block';
    btn.classList.toggle('open',!showing);
    var anyVisible=[].slice.call(wrap.querySelectorAll('.ev-reveal-block')).some(function(b){return b.style.display!=='none';});
    wrap.classList.toggle('open',anyVisible);
  };

  // ── pathway rendering — verbatim from the CRIMENET app ──
  function renderPathways(a,b){
    var r=findPaths(a,b,PATH_MAX_HOPS,2,PATH_CAP);pfCurrentPaths=r.paths;
    var html='<div class="rp-section-title"><span>Connection Pathways</span><span class="rp-section-count">'+r.paths.length+(r.truncated?'+':'')+'</span></div>';
    var summary;
    if(r.shortest===null)summary='<span class="nolink">No route found</span> linking these two within the network.';
    else if(r.shortest===1)summary='These two are <b>directly linked</b> (see above). Routes through one shared organization are listed below.';
    else summary='Linked through <b>one shared organization</b>. Each route below passes through a single intermediary.';
    html+='<div class="pf-summary">'+summary+'</div>';
    if(r.paths.length===0){
      var msg;
      if(r.shortest!==null&&r.shortest>PATH_MAX_HOPS)msg='These two are connected, but only through a longer chain — no route passes through just <b style="color:var(--amber);">one shared organization</b>.';
      else if(r.shortest===1)msg='No indirect route through a shared organization — their only link is the direct one above.';
      else msg='No connection pathway through a single shared organization.';
      html+='<div class="rp-empty" style="padding:18px; margin-top:0;">'+msg+'</div>';
      return html;
    }
    if(r.truncated)html+='<div class="pf-summary" style="color:var(--text3); margin-top:-6px;">Showing the first '+PATH_CAP+' routes (more shared organizations exist).</div>';
    html+='<div class="path-list">';
    r.paths.forEach(function(p,idx){html+=renderPathItem(p,idx);});
    html+='</div>';return html;
  }
  function renderPathItem(path,idx){
    var chain='';
    for(var i=0;i<path.length;i++){
      var name=path[i],isEndpoint=(i===0||i===path.length-1);
      chain+='<span class="path-node '+(isEndpoint?'endpoint':'mid')+'">'+escHtml(name)+'</span>';
      if(i<path.length-1)chain+='<span class="path-connector"><span class="pc-line"></span></span>';
    }
    var hops=path.length-1;
    return '<div class="path-item" id="pfpath'+idx+'"><div class="path-head" onclick="pfTogglePath('+idx+')"><span class="path-rank">'+(idx+1)+'</span><span class="path-chain">'+chain+'</span><span class="path-hopcount">'+hops+' hop'+(hops>1?'s':'')+'</span><span class="path-toggle">▼</span></div><div class="path-evidence" id="pfpath'+idx+'-ev"></div></div>';
  }
  function edgesBetween(u,v){var o=[];if(orgADJ[u])orgADJ[u].forEach(function(e){if(e._other===v)o.push(e);});if(!o.length&&orgADJ[v])orgADJ[v].forEach(function(e){if(e._other===u)o.push(e);});return o;}
  window.pfTogglePath=function(idx){
    var item=document.getElementById('pfpath'+idx),evBox=document.getElementById('pfpath'+idx+'-ev');
    if(!item||!evBox)return;
    if(item.classList.contains('open')){item.classList.remove('open');return;}
    item.classList.add('open');
    if(evBox.dataset.loaded==='1')return;
    var path=pfCurrentPaths[idx];if(!path)return;
    evBox.innerHTML='<div class="pf-loading">'+SPINNER_SVG+'<span>Loading evidence for this route…</span></div>';
    var toFetch=path.slice(0,-1).filter(function(n){return !orgADJ[n];});
    toFetch=toFetch.filter(function(v,i){return toFetch.indexOf(v)===i;});
    Promise.all(toFetch.map(function(n){return fetchConnections(n).catch(function(){});})).then(function(){
      if(!item.classList.contains('open')||pfCurrentPaths[idx]!==path)return;
      var html='';
      for(var i=0;i<path.length-1;i++){
        var u=path[i],v=path[i+1],edges=edgesBetween(u,v);
        html+='<div class="path-hop-ev"><div class="path-hop-head"><div class="path-hop-pair"><span>'+escHtml(u)+'</span><span class="hp-link">—</span><span>'+escHtml(v)+'</span></div></div>'+(edges.length?renderEdgeContent(edges):'<div class="rp-empty" style="padding:12px; margin:0; font-size:15px; border-style:solid;">Evidence unavailable for this hop.</div>')+'</div>';
      }
      evBox.innerHTML=html;evBox.dataset.loaded='1';
    });
  };

  // ── load topology, autocomplete, run ──
  if(LOCKED)A=LOCKED;  // org page: side A is fixed to this org from the start
  var ready=fetch(BASE+'crimenet_adj.json').then(function(r){return r.json();}).then(function(raw){
    for(var name in raw){adjNeighbors[name]=raw[name].map(function(x){return x.t;});adjRel[name]={};raw[name].forEach(function(x){adjRel[name][x.t]=x.r||[];});}
    names=Object.keys(raw);adjReady=true;
    if(A)ensureA();  // prefetch A's connections so Org B can suggest them instantly
  }).catch(function(){if(out)out.innerHTML='<div class="pf-msg">Connection data unavailable.</div>';});

  // Linkage count between A and a neighbour — same metric as the CRIMENET app (sum of
  // descriptions per edge, min 1). Used to order Org B's suggestions.
  function evidenceCount(edges){var n=0;edges.forEach(function(e){var d=Array.isArray(e.descriptions)?e.descriptions.filter(Boolean):[];n+=d.length||1;});return n;}
  function ensureA(){if(A&&!orgADJ[A])return fetchConnections(A).catch(function(){});return Promise.resolve();}
  // A's direct connections as [name, linkageCount], most linkages first.
  function neighborList(a){
    var adj=orgADJ[a]||[],m={};
    adj.forEach(function(e){(m[e._other]=m[e._other]||[]).push(e);});
    var arr=Object.keys(m).map(function(o){return [o,evidenceCount(m[o])];});
    arr.sort(function(x,y){return y[1]-x[1]||x[0].localeCompare(y[0]);});
    return arr;
  }
  function opt(name,meta){return '<div class="pf-opt" data-n="'+escHtml(name)+'">'+escHtml(name)+'<span class="pf-opt-d">'+escHtml(meta)+'</span></div>';}

  // Global name search (used for Org A, and as Org B's fallback for non-neighbours).
  function rank(q){q=fold(q);if(!q)return [];var hits=[];for(var i=0;i<names.length;i++){var p=fold(names[i]).indexOf(q);if(p!==-1)hits.push([names[i],p===0,adjNeighbors[names[i]].length]);}hits.sort(function(a,b){return (a[1]!==b[1])?(a[1]?-1:1):(b[2]-a[2]);});return hits.slice(0,12);}

  function wireA(input,dd){
    if(!input)return;
    function close(){dd.classList.remove('open');dd.innerHTML='';}
    input.addEventListener('input',function(){
      if(!adjReady)return;var hits=rank(input.value);
      if(!input.value.trim()||!hits.length){close();return;}
      dd.innerHTML=hits.map(function(h){return opt(h[0],String(h[2]));}).join('');dd.classList.add('open');
    });
    dd.addEventListener('mousedown',function(e){var o=e.target.closest('.pf-opt');if(!o)return;e.preventDefault();A=o.dataset.n;input.value=A;close();ensureA();});
    input.addEventListener('blur',function(){setTimeout(close,150);});
    input.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();var h=rank(input.value);if(h.length){A=h[0][0];input.value=A;close();ensureA();if(elB)elB.focus();}}});
  }

  function wireB(input,dd){
    if(!input)return;
    function close(){dd.classList.remove('open');dd.innerHTML='';}
    function show(){
      if(!adjReady)return;
      var q=fold(input.value.trim()),html='';
      // Prefer A's direct connections, ranked by linkage count (descending).
      if(A&&orgADJ[A]){
        var nb=neighborList(A);
        if(q)nb=nb.filter(function(p){return fold(p[0]).indexOf(q)!==-1;});
        if(nb.length)html=nb.slice(0,20).map(function(p){return opt(p[0],p[1]+(p[1]===1?' linkage':' linkages'));}).join('');
      }
      // Fall back to a global search so any org can still be picked as B.
      if(!html&&q){html=rank(input.value).filter(function(h){return h[0]!==A;}).map(function(h){return opt(h[0],String(h[2]));}).join('');}
      if(!html){close();return;}
      dd.innerHTML=html;dd.classList.add('open');
    }
    input.addEventListener('focus',function(){ensureA().then(show);});
    input.addEventListener('input',function(){ensureA().then(show);});
    dd.addEventListener('mousedown',function(e){var o=e.target.closest('.pf-opt');if(!o)return;e.preventDefault();B=o.dataset.n;input.value=B;close();});
    input.addEventListener('blur',function(){setTimeout(close,150);});
    input.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();var first=dd.querySelector('.pf-opt');if(first){B=first.dataset.n;input.value=B;close();go.click();}}});
  }

  function run(){
    if(!adjReady){ready.then(run);return;}
    if(LOCKED)A=LOCKED;
    if(!A){out.innerHTML='<div class="pf-msg">Pick organization A.</div>';out.classList.add('open');reset.hidden=false;return;}
    if(!B){out.innerHTML='<div class="pf-msg">Pick organization B.</div>';out.classList.add('open');reset.hidden=false;return;}
    if(A===B){out.innerHTML='<div class="pf-msg">Choose two different organizations.</div>';out.classList.add('open');reset.hidden=false;return;}
    // Direct linkages first (lazy-load both endpoints' evidence), then pathways.
    out.innerHTML='<div class="pf-loading" style="padding:18px 4px;">'+SPINNER_SVG+'<span>Retrieving evidence…</span></div>';
    out.classList.add('open');reset.hidden=false;
    Promise.all([fetchConnections(A).catch(function(){}),fetchConnections(B).catch(function(){})]).then(function(){
      var rels=(orgADJ[A]||[]).filter(function(r){return r._other===B;});
      var total=rels.length;
      var direct='<div class="rp-section-title"><span>Direct linkages</span><span class="rp-section-count">'+(total===1?'1 linkage':total+' linkages')+'</span></div>';
      if(rels.length===0)direct+='<div class="rp-empty" style="padding:18px;">No <b style="color:var(--text-main);">direct</b> linkage between these two — check the connection pathways below.</div>';
      else direct+='<div class="rp-interactions">'+renderEdgeContent(rels)+'</div>';
      out.innerHTML=direct+renderPathways(A,B);
    });
  }

  go.addEventListener('click',run);
  reset.addEventListener('click',function(){B=null;if(elB)elB.value='';if(!LOCKED){A=null;if(elA)elA.value='';}out.innerHTML='';out.classList.remove('open');reset.hidden=true;});
  wireA(elA,document.getElementById('pf-dd-a'));
  wireB(elB,document.getElementById('pf-dd-b'));
})();
// Forward wheel events from panel surface (e.g. header) to the scroll container
document.querySelectorAll('.browse-panel').forEach(function(p){p.addEventListener('wheel',function(e){var s=p.querySelector('.panel-scroll');if(!s||e.target===s||s.contains(e.target))return;if(s.scrollHeight<=s.clientHeight)return;e.preventDefault();s.scrollTop+=e.deltaY;},{passive:false});});
</script></div>
</body>
