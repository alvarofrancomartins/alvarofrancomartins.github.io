<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #ffffff; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const W = 2400, H = 1800;
const canvas = document.getElementById('c');
canvas.width = W; canvas.height = H;
canvas.style.width = '800px';
canvas.style.height = '600px';
const ctx = canvas.getContext('2d');

const colors = ['#2563eb', '#ea580c', '#16a34a'];
// Much bigger community circles
const C1 = { cx: 660, cy: 780, r: 450 };
const C2 = { cx: 1200, cy: 1080, r: 400 };
const C3 = { cx: 1740, cy: 780, r: 450 };

function makeCommunity(c, n) {
  const nodes = [];
  for (let i = 0; i < n; i++) {
    // Place nodes in a ring with some radial variation but never near center
    const a = (i / n) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
    const r = (0.5 + Math.random() * 0.5) * c.r;
    nodes.push({ x: c.cx + Math.cos(a) * r, y: c.cy + Math.sin(a) * r, r: 16 + Math.random() * 10, com: c });
  }
  return nodes;
}

let c1Nodes = makeCommunity(C1, 9);
let c2Nodes = makeCommunity(C2, 8);
let c3Nodes = makeCommunity(C3, 9);

function repel(nodes, strength) {
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[j].x - nodes[i].x;
      const dy = nodes[j].y - nodes[i].y;
      const d = Math.sqrt(dx * dx + dy * dy) || 0.01;
      if (d < 200) {
        const f = strength / (d * d);
        const fx = (dx / d) * f;
        const fy = (dy / d) * f;
        nodes[i].x -= fx; nodes[i].y -= fy;
        nodes[j].x += fx; nodes[j].y += fy;
      }
    }
  }
}

function attract(nodes, strength) {
  nodes.forEach(n => {
    const dx = n.com.cx - n.x;
    const dy = n.com.cy - n.y;
    n.x += dx * strength;
    n.y += dy * strength;
  });
}

const allNodes = [c1Nodes, c2Nodes, c3Nodes];
for (let iter = 0; iter < 100; iter++) {
  allNodes.forEach(ns => { repel(ns, 25000); attract(ns, 0.06); });
}

function drawIntraEdges(nodes) {
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      if (Math.random() > 0.5) continue;
      ctx.beginPath();
      ctx.moveTo(nodes[i].x, nodes[i].y);
      ctx.lineTo(nodes[j].x, nodes[j].y);
      ctx.strokeStyle = '#1c1c1c';
      ctx.lineWidth = 2.4;
      ctx.stroke();
    }
  }
}

function drawCrossEdges(a, b) {
  const na = a[Math.floor(Math.random() * a.length)];
  const nb = b[Math.floor(Math.random() * b.length)];
  ctx.beginPath();
  ctx.moveTo(na.x, na.y);
  ctx.lineTo(nb.x, nb.y);
  ctx.strokeStyle = '#1c1c1c';
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.35;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

drawIntraEdges(c1Nodes);
drawIntraEdges(c2Nodes);
drawIntraEdges(c3Nodes);
for (let i = 0; i < 8; i++) {
  drawCrossEdges(c1Nodes, c2Nodes);
  drawCrossEdges(c2Nodes, c3Nodes);
  drawCrossEdges(c1Nodes, c3Nodes);
}

[{c: C1, col: colors[0]}, {c: C2, col: colors[1]}, {c: C3, col: colors[2]}].forEach(({c, col}) => {
  ctx.beginPath();
  ctx.arc(c.cx, c.cy, c.r * 0.55, 0, Math.PI * 2);
  ctx.strokeStyle = col;
  ctx.lineWidth = 3.6;
  ctx.setLineDash([15, 48]);
  ctx.stroke();
  ctx.setLineDash([]);
});

allNodes.forEach((nodes, i) => {
  const col = colors[i];
  nodes.forEach(n => {
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = col;
    ctx.fill();
    ctx.strokeStyle = '#1c1c1c';
    ctx.lineWidth = 3;
    ctx.stroke();
  });
});

ctx.font = '42px "Oswald", sans-serif';
ctx.textAlign = 'center';
ctx.fillStyle = colors[0];
ctx.fillText('Community A', 660, C1.cy + C1.r * 0.55 + 80);
ctx.fillStyle = colors[1];
ctx.fillText('Community B', 1200, C2.cy + C2.r * 0.55 + 80);
ctx.fillStyle = colors[2];
ctx.fillText('Community C', 1740, C3.cy + C3.r * 0.55 + 80);
</script>
</body>
</html>
