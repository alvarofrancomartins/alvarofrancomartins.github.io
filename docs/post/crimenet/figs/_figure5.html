<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #ffffff; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const W = 2400, H = 1800;
const canvas = document.getElementById('c');
canvas.width = W; canvas.height = H;
canvas.style.width = '800px';
canvas.style.height = '600px';
const ctx = canvas.getContext('2d');

const c1Color = '#2563eb';
const c2Color = '#ea580c';
const bridgeColor = '#16a34a';

// Bigger community circles
const C1 = { cx: 660, cy: 900, r: 430 };
const C2 = { cx: 1740, cy: 900, r: 430 };

function makeCommunity(c, n) {
  const nodes = [];
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
    const r = (0.5 + Math.random() * 0.5) * c.r;
    nodes.push({ x: c.cx + Math.cos(a) * r, y: c.cy + Math.sin(a) * r, r: 16 + Math.random() * 10, com: c });
  }
  return nodes;
}

let c1 = makeCommunity(C1, 10);
let c2 = makeCommunity(C2, 10);

function repel(nodes, strength) {
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[j].x - nodes[i].x;
      const dy = nodes[j].y - nodes[i].y;
      const d = Math.sqrt(dx * dx + dy * dy) || 0.01;
      if (d < 200) {
        const f = strength / (d * d);
        const fx = (dx / d) * f;
        const fy = (dy / d) * f;
        nodes[i].x -= fx; nodes[i].y -= fy;
        nodes[j].x += fx; nodes[j].y += fy;
      }
    }
  }
}

function attract(nodes, strength) {
  nodes.forEach(n => {
    const dx = n.com.cx - n.x;
    const dy = n.com.cy - n.y;
    n.x += dx * strength;
    n.y += dy * strength;
  });
}

[c1, c2].forEach(ns => { for (let i = 0; i < 100; i++) { repel(ns, 25000); attract(ns, 0.06); } });

const bridge = { x: 1200, y: 900 };

[{c: C1, col: c1Color}, {c: C2, col: c2Color}].forEach(({c, col}) => {
  ctx.beginPath();
  ctx.arc(c.cx, c.cy, c.r * 0.55, 0, Math.PI * 2);
  ctx.strokeStyle = col;
  ctx.lineWidth = 3.6;
  ctx.setLineDash([15, 48]);
  ctx.stroke();
  ctx.setLineDash([]);
});

function drawEdges(nodes) {
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      if (Math.random() > 0.5) continue;
      ctx.beginPath();
      ctx.moveTo(nodes[i].x, nodes[i].y);
      ctx.lineTo(nodes[j].x, nodes[j].y);
      ctx.strokeStyle = '#1c1c1c';
      ctx.lineWidth = 2.4;
      ctx.stroke();
    }
  }
}
drawEdges(c1);
drawEdges(c2);

function bridgeEdges(com) {
  com.sort(() => Math.random() - 0.5).slice(0, 5).forEach(t => {
    ctx.beginPath();
    ctx.moveTo(bridge.x, bridge.y);
    ctx.lineTo(t.x, t.y);
    ctx.strokeStyle = '#1c1c1c';
    ctx.lineWidth = 2.4;
    ctx.stroke();
  });
}
bridgeEdges(c1);
bridgeEdges(c2);

[...c1, ...c2].forEach(n => {
  const col = n.com === C1 ? c1Color : c2Color;
  ctx.beginPath();
  ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
  ctx.fillStyle = col;
  ctx.fill();
  ctx.strokeStyle = '#1c1c1c';
  ctx.lineWidth = 3;
  ctx.stroke();
});

ctx.save();
ctx.shadowColor = bridgeColor + '40';
ctx.shadowBlur = 72;
ctx.beginPath();
ctx.arc(bridge.x, bridge.y, 60, 0, Math.PI * 2);
ctx.fillStyle = bridgeColor;
ctx.fill();
ctx.restore();
ctx.beginPath();
ctx.arc(bridge.x, bridge.y, 60, 0, Math.PI * 2);
ctx.strokeStyle = '#1c1c1c';
ctx.lineWidth = 3.6;
ctx.stroke();

ctx.font = '42px "Oswald", sans-serif';
ctx.textAlign = 'center';
ctx.fillStyle = c1Color;
ctx.fillText('Community A', 660, C1.cy + C1.r * 0.55 + 80);
ctx.fillStyle = c2Color;
ctx.fillText('Community B', 1740, C2.cy + C2.r * 0.55 + 80);
ctx.fillStyle = bridgeColor;
ctx.font = 'bold 48px "Oswald", sans-serif';
ctx.fillText('Bridge', 1200, 750);
</script>
</body>
</html>
