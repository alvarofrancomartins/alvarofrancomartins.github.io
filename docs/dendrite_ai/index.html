<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dendrite x Last.fm — Twisted Branches</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #f9fafb;
            --bg-card: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --accent: #c53030;
            --accent-hover: #a02828;
            --border-color: #d1d5db;
        }

        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: var(--bg-page); color: var(--text-main); }

        .artistas-app-wrapper {
            max-width: 900px;
            margin: 0 auto 30px auto;
            text-align: center;
        }
        
        .artistas-app-header h2 { color: var(--accent); margin: 0 0 8px 0; font-weight: 700; font-size: 2rem; }
        .artistas-app-header p { margin: 0 0 24px 0; font-size: 1.05rem; color: var(--text-muted); }

        .artistas-app-search-container {
            display: flex;
            justify-content: center;
            align-items: stretch;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }
        .input-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .artistas-app-search-container input[type="text"] {
            padding: 12px 16px;
            width: clamp(200px, 30vw, 300px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .artistas-app-search-container input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(197, 48, 48, 0.15);
        }

        .action-buttons {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        button#search-button-app {
            padding: 0 24px;
            height: 44px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        button#search-button-app:hover { background-color: var(--accent-hover); }

        button.artistas-app-playlist-button {
            background-color: #2563eb;
            color: white;
            padding: 0 20px;
            height: 44px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button.artistas-app-playlist-button:hover { background-color: #1d4ed8; }
        button.artistas-app-playlist-button:disabled { background-color: #9ca3af; cursor: not-allowed; }

        .artistas-app-feedback { text-align: center; margin: 8px 0; min-height: 24px; font-size: 1rem; color: var(--text-muted); font-weight: 500; }
        .artistas-app-feedback.error { color: var(--accent); }
        .artistas-app-feedback .spinner { display: inline-block; width: 14px; height: 14px; margin-left: 8px; border: 2px solid var(--border-color); border-left-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }

        .artistas-app-sankey-container { width: 100%; background-color: var(--bg-card); border-radius: 12px; box-shadow: 0 6px 12px rgba(0,0,0,0.08); padding: 10px; box-sizing: border-box; overflow-x: auto; border: 1px solid var(--border-color); margin-bottom: 20px;}
        .artistas-app-sankey-container svg { display: block; width: 100%; min-height: 800px; }
        
        .sankey-node-group { cursor: pointer; }
        .sankey-node { fill-opacity: 1; stroke: rgba(0,0,0,0.2); stroke-width: 1px; transition: all 0.2s ease; }
        .sankey-node-group:hover .sankey-node { stroke-width: 2px; stroke: rgba(0,0,0,0.5); filter: brightness(1.1); }
        .sankey-node-image { opacity: 0.95; transition: all 0.2s ease; }
        .sankey-node-group:hover .sankey-node-image { opacity: 1; filter: brightness(1.1); }
        
        .sankey-link { fill: none; stroke-opacity: 0.45; transition: stroke-opacity 0.2s ease; }
        .sankey-link:hover { stroke-opacity: 0.8; }
        
        .sankey-node-label { pointer-events: none; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; fill: var(--text-main); transition: all 0.2s ease; }
        .sankey-node-group:hover .sankey-node-label { font-weight: 700; font-size: 15px; }

        .artistas-app-modal-overlay { position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.6); display: flex; justify-content: center; align-items: center; z-index: 2000; opacity: 0; visibility: hidden; transition: all 0.3s ease; backdrop-filter: blur(4px); }
        .artistas-app-modal-overlay.active { opacity: 1; visibility: visible; }
        .artistas-app-modal-content { background-color: white; padding: 24px 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 650px; max-height: 80vh; overflow-y: auto; position: relative; }
        .artistas-app-modal-content h2 { margin-top: 0; margin-bottom: 15px; font-size: 1.5rem; color: var(--accent); }
        .artistas-app-modal-content ul { list-style: decimal; padding-left: 20px; }
        .artistas-app-modal-content li { margin-bottom: 10px; font-size: 0.95rem; }
        .artistas-app-modal-content li a { color: #2563eb; text-decoration: none; font-weight: 600; }
        .artistas-app-modal-content li a:hover { text-decoration: underline; }
        .artistas-app-modal-close-button { position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 1.8rem; cursor: pointer; color: var(--text-muted); padding: 0; line-height: 1; transition: color 0.2s; }
        .artistas-app-modal-close-button:hover { color: var(--text-main); }
        
        .artistas-app-footer { text-align: center; padding: 20px 0; font-size: 0.85rem; color: var(--text-muted); }
        .artistas-app-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="artistas-app-container" class="artistas-app-wrapper">
    <header class="artistas-app-header">
        <h2>Twisted Branches</h2>
        <p>Start with a band. Last.fm finds similar artists, and the LLM twists them to match your vibe.</p>
    </header>
    <div class="artistas-app-search-container">
        <div class="input-group">
            <label>Starting Artist</label>
            <input type="text" id="artist-input-app" placeholder="e.g. Radiohead" value="Radiohead">
        </div>
        <div class="input-group">
            <label>Twist / Vibe (Optional)</label>
            <input type="text" id="twist-input-app" placeholder="e.g. Psychedelic, Chaotic" value="Psychedelic">
        </div>
        <div class="action-buttons">
            <button id="search-button-app">Explore</button>
            <button id="generate-diagram-playlist-btn-app" class="artistas-app-playlist-button" disabled>✨ Generate Playlist</button>
        </div>
    </div>
    <div id="search-feedback-message-app" class="artistas-app-feedback"></div>
</div>

<div id="sankey-chart-container-app" class="artistas-app-sankey-container" style="display: none;">
    <div id="sankey-chart-app"></div>
</div>

<div id="playlist-modal-overlay-app" class="artistas-app-modal-overlay">
    <div class="artistas-app-modal-content">
        <button id="modal-close-btn-app" class="artistas-app-modal-close-button">&times;</button>
        <h2 id="playlist-modal-title-app">🎶 Sankey Playlist</h2>
        <div id="playlist-modal-body-app"></div>
    </div>
</div>

<footer class="artistas-app-footer">
    Powered by Last.fm Graph API & DeepSeek LLM
</footer>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
<script>
(function() {
    // --- Configuration ---
    const API_KEY = 'proxy'; 
    const MAX_DEPTH_APP = 3; 
    const SIMILAR_ARTISTS_LIMIT = 3; 

    const artistInputApp = document.getElementById('artist-input-app');
    const twistInputApp = document.getElementById('twist-input-app');
    const searchButtonApp = document.getElementById('search-button-app');
    const generateDiagramPlaylistBtnApp = document.getElementById('generate-diagram-playlist-btn-app');
    const searchFeedbackMessageApp = document.getElementById('search-feedback-message-app');
    const sankeyChartContainerApp = document.getElementById('sankey-chart-container-app');
    const sankeyChartDivApp = document.getElementById('sankey-chart-app');

    const playlistModalOverlayApp = document.getElementById('playlist-modal-overlay-app');
    const playlistModalTitleApp = document.getElementById('playlist-modal-title-app');
    const playlistModalBodyApp = document.getElementById('playlist-modal-body-app');
    const modalCloseBtnApp = document.getElementById('modal-close-btn-app');

    let currentGraphNodesApp = [];
    let cachedPlaylistDataApp = null;
    let cachedDiagramSignatureApp = null;

    const marginApp = {top: 40, right: 180, bottom: 40, left: 180}; 
    const nodeWidthApp = 50; // Wider to fit images
    const nodePaddingVerticalApp = 40; 
    const simpleColors = ["#66c2a5", "#fc8d62", "#8da0cb", "#e78ac3", "#a6d854", "#ffd92f"];

    function initializePageApp() {
        searchButtonApp.addEventListener('click', handleSearchApp);
        artistInputApp.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSearchApp(); });
        twistInputApp.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSearchApp(); });
        generateDiagramPlaylistBtnApp.addEventListener('click', handleGenerateDiagramPlaylistApp);
        modalCloseBtnApp.addEventListener('click', () => playlistModalOverlayApp.classList.remove('active'));
        playlistModalOverlayApp.addEventListener('click', (e) => {
            if (e.target === playlistModalOverlayApp) playlistModalOverlayApp.classList.remove('active');
        });
        // handleSearchApp(); // Trigger on load if needed
    }

    function showLoadingApp(message) {
        searchFeedbackMessageApp.innerHTML = message + '<span class="spinner"></span>';
        searchFeedbackMessageApp.className = 'artistas-app-feedback';
        sankeyChartContainerApp.style.display = 'none';
        generateDiagramPlaylistBtnApp.disabled = true;
        searchButtonApp.disabled = true;
    }

    function hideLoadingApp() {
        searchButtonApp.disabled = false;
        searchFeedbackMessageApp.innerHTML = '';
    }

    function showErrorApp(message) {
        searchFeedbackMessageApp.textContent = message;
        searchFeedbackMessageApp.className = 'artistas-app-feedback error';
        sankeyChartContainerApp.style.display = 'none';
        generateDiagramPlaylistBtnApp.disabled = true;
        searchButtonApp.disabled = false;
    }

    // --- API Proxies ---
    async function callNetlifyProxy(method, artistName = null, limit = SIMILAR_ARTISTS_LIMIT) {
        const netlifyFunctionBaseUrl = "https://afmartins.netlify.app/.netlify/functions/lastfm-proxy";
        let proxyUrl = `${netlifyFunctionBaseUrl}?method=${method}`;
        if (artistName) proxyUrl += `&artist=${encodeURIComponent(artistName)}`;
        if (method === 'artist.getsimilar' || method === 'artist.gettoptracks') proxyUrl += `&limit=${limit}`;

        const response = await fetch(proxyUrl);
        const data = await response.json();
        if (!response.ok || data.error) throw new Error(data.message || data.error || `Proxy Error (${response.status})`);
        return data;
    }

    async function fetchArtistInfoAPIApp(artistName) {
        const data = await callNetlifyProxy('artist.getinfo', artistName);
        if (!data.artist) throw new Error (`Artist "${artistName}" not found on Last.fm.`);
        return data.artist;
    }

    async function fetchSimilarArtistsAPIApp(artistName) {
        try {
            const data = await callNetlifyProxy('artist.getsimilar', artistName, SIMILAR_ARTISTS_LIMIT);
            return (data.similarartists && Array.isArray(data.similarartists.artist)) ? data.similarartists.artist : [];
        } catch (e) { return []; }
    }

    async function fetchArtistTopTrackAPIApp(artistName) {
         try {
            const data = await callNetlifyProxy('artist.gettoptracks', artistName, 1);
            if (!data.toptracks || !data.toptracks.track || data.toptracks.track.length === 0) return null;
            return data.toptracks.track[0];
        } catch (e) { return null; }
    }

    // --- Image Fetching ---
    async function fetchArtistImage(name) {
        try {
            const r = await fetch('https://itunes.apple.com/search?term=' + encodeURIComponent(name) + '&entity=musicArtist&limit=1');
            const d = await r.json();
            if (d.results && d.results.length && d.results[0].artworkUrl100) return d.results[0].artworkUrl100.replace('100x100bb', '600x600bb');
        } catch (e) {}
        try {
            const r = await fetch('https://en.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=' + encodeURIComponent(name) + '&gsrlimit=1&prop=pageimages&pithumbsize=600&format=json&origin=*');
            const d = await r.json();
            if (d.query && d.query.pages) {
                const pages = Object.values(d.query.pages);
                if (pages.length && pages[0].thumbnail) return pages[0].thumbnail.source;
            }
        } catch (e) {}
        return null;
    }

    function lazyLoadImage(nodeData) {
        fetchArtistImage(nodeData.name).then(url => {
            if (url) {
                nodeData.imageUrl = url;
                d3.select(`#img-${nodeData.id}`).attr("href", url);
                d3.select(`#rect-${nodeData.id}`).style("display", "none"); // Hide fallback SVG
            }
        });
    }

    function generateNodeSVG(name, depth) {
        const bg = simpleColors[depth % simpleColors.length];
        const initials = name.replace(/\s*\(.*?\)\s*/g, '').split(/[\s\-\/]+/).filter(w => w && /^[a-zA-Z]/.test(w)).slice(0, 2).map(w => w[0].toUpperCase()).join('');
        return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="${bg}"/><text x="50" y="50" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-weight="700" font-size="32" fill="rgba(255,255,255,0.85)">${initials}</text></svg>`)}`;
    }

    // --- LLM Twisting ---
    async function callLLMTwist(artistsArray, twist, avoidList) {
        const limit = artistsArray.length;
        const fullSystem = `You are an expert music curator. 
The user will provide a list of seed bands/artists. For EACH artist, recommend EXACTLY ONE new band/artist that shares some musical DNA with the seed, BUT heavily embodies the requested twist/vibe: "${twist}".
CRITICAL RULES:
- Return ONLY band/artist names.
- NEVER return specific song titles or albums.
- Do NOT recommend anything already in the avoid list.
- You must return EXACTLY ${limit} recommendations in the exact order mapping 1-to-1 to the input list.
Return ONLY JSON: {"recommendations": ["Twisted Band A", "Twisted Band B"]}`;

        const userMsg = `Avoid List: [${avoidList.join(', ')}]\nSeed Artists: ${artistsArray.join(', ')}\nProvide exactly ${limit} recommendations.`;

        const payload = { model: 'deepseek-chat', messages: [{ role: 'system', content: fullSystem }, { role: 'user', content: userMsg }], response_format: { type: 'json_object' } };
        const isProxy = API_KEY === 'proxy';
        const fetchUrl = isProxy ? 'https://afmartins.netlify.app/.netlify/functions/chat' : 'https://api.deepseek.com/chat/completions';
        const fetchHeaders = { 'Content-Type': 'application/json' };
        if (!isProxy) fetchHeaders['Authorization'] = 'Bearer ' + API_KEY;

        for (let attempt = 0; attempt < 3; attempt++) {
            try {
                const res = await fetch(fetchUrl, { method: 'POST', headers: fetchHeaders, body: JSON.stringify(payload) });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                const parsed = JSON.parse(data.choices[0].message.content);
                if (parsed.recommendations && parsed.recommendations.length > 0) return parsed.recommendations;
            } catch (e) {
                console.warn('LLM Attempt failed', e);
                await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
            }
        }
        return artistsArray; // Fallback to original
    }

    // --- Graph Generation Logic ---
    function safeId(name) { return name.replace(/[^a-zA-Z0-9]/g, '_'); }

    async function generateSankeyDataApp(initialArtistName, twist, maxDepth) {
        const rawLinks = [];
        const fetchedArtists = new Set();
        const allNodesData = new Map();

        let initialArtistData = await fetchArtistInfoAPIApp(initialArtistName);
        let currentLevelNodes = [initialArtistData.name];
        fetchedArtists.add(initialArtistData.name.toLowerCase());
        
        allNodesData.set(initialArtistData.name, { 
            name: initialArtistData.name, 
            url: initialArtistData.url, 
            explicitDepth: 0, 
            id: safeId(initialArtistData.name) 
        });
        lazyLoadImage(allNodesData.get(initialArtistData.name));

        // Process Graph Level-by-Level to batch LLM calls for speed
        for (let currentDepth = 0; currentDepth < maxDepth; currentDepth++) {
            if (currentLevelNodes.length === 0) break;
            let nextLevelNodes = [];

            // Fetch Last.fm for all nodes in current depth concurrently
            const levelPromises = currentLevelNodes.map(async (currentArtist) => {
                const similarArtists = await fetchSimilarArtistsAPIApp(currentArtist);
                let topSimilar = similarArtists.slice(0, SIMILAR_ARTISTS_LIMIT);

                let processedEdges = [];
                if (twist && topSimilar.length > 0) {
                    const originalNames = topSimilar.map(a => a.name);
                    // Ask LLM to twist the recommendations
                    const twistedNames = await callLLMTwist(originalNames, twist, Array.from(fetchedArtists));
                    
                    for (let i = 0; i < topSimilar.length; i++) {
                        const twistedName = (twistedNames[i] && twistedNames[i].toLowerCase() !== 'none') ? twistedNames[i] : originalNames[i];
                        processedEdges.push({ 
                            name: twistedName, 
                            weight: parseFloat(topSimilar[i].match) * 100 || 50, 
                            url: `https://www.last.fm/music/${encodeURIComponent(twistedName.replace(/\s+/g, '+'))}` // Dynamic URL for twisted
                        });
                    }
                } else {
                    processedEdges = topSimilar.map(a => ({ name: a.name, weight: parseFloat(a.match) * 100 || 50, url: a.url }));
                }

                // Process edges synchronously to safely track duplicates
                const validEdges = [];
                for (let edge of processedEdges) {
                    const normalized = edge.name.toLowerCase();
                    if (!fetchedArtists.has(normalized)) {
                        fetchedArtists.add(normalized);
                        allNodesData.set(edge.name, { 
                            name: edge.name, 
                            url: edge.url, 
                            explicitDepth: currentDepth + 1, 
                            id: safeId(edge.name) 
                        });
                        lazyLoadImage(allNodesData.get(edge.name));
                        nextLevelNodes.push(edge.name);
                    }
                    validEdges.push(edge);
                }

                return { source: currentArtist, edges: validEdges };
            });

            // Wait for all processing of this depth to complete
            const results = await Promise.all(levelPromises);

            results.forEach(res => {
                res.edges.forEach(edge => {
                    const sourceNode = allNodesData.get(res.source);
                    const targetNode = allNodesData.get(edge.name);
                    // Prevent circular links back up the tree
                    if (sourceNode && targetNode && targetNode.explicitDepth > sourceNode.explicitDepth) {
                        rawLinks.push({ source: res.source, target: edge.name, value: Math.max(0.01, edge.weight) });
                    }
                });
            });

            currentLevelNodes = nextLevelNodes;
        }

        const nodes = Array.from(allNodesData.values());
        const links = rawLinks.filter(link => allNodesData.has(link.source) && allNodesData.has(link.target));

        return { nodes, links, initialArtistName: initialArtistData.name };
    }

    // --- D3 Drawing ---
    function drawSankeyD3App(sankeyData) {
        const { nodes, links, initialArtistName } = sankeyData;
        currentGraphNodesApp = [];

        if (!nodes || nodes.length === 0) {
            showErrorApp(`No data found for "${initialArtistName}".`);
            return;
        }

        const containerWidth = Math.max(800, sankeyChartDivApp.clientWidth);
        const dynamicHeight = Math.max(600, nodes.length * 40 + links.length * 15);
        const width = containerWidth - marginApp.left - marginApp.right;
        const height = dynamicHeight - marginApp.top - marginApp.bottom;

        sankeyChartDivApp.innerHTML = ''; 
        const svg = d3.select(sankeyChartDivApp).append("svg")
            .attr("width", containerWidth)
            .attr("height", dynamicHeight)
          .append("g")
            .attr("transform", `translate(${marginApp.left},${marginApp.top})`);

        const sankey = d3.sankey()
            .nodeId(d => d.name)
            .nodeAlign(node => node.explicitDepth)
            .nodeWidth(nodeWidthApp)
            .nodePadding(nodePaddingVerticalApp)
            .extent([[0, 5], [width, height - 5]])
            .iterations(32);

        let graph;
        try {
            graph = sankey({ nodes: JSON.parse(JSON.stringify(nodes)), links: JSON.parse(JSON.stringify(links)) });
        } catch (error) {
            showErrorApp(`Layout error: ${error.message}.`); return;
        }

        // Merge runtime calculated bounds with our original tracked data (which holds the ID for images)
        graph.nodes.forEach(gn => {
            const originalNode = nodes.find(n => n.name === gn.name);
            gn.id = originalNode.id;
            gn.imageUrl = originalNode.imageUrl;
            gn.explicitDepth = originalNode.explicitDepth;
        });

        currentGraphNodesApp = graph.nodes; 
        generateDiagramPlaylistBtnApp.disabled = false;

        const defs = svg.append("defs");
        
        // Setup clip paths for rounded images
        graph.nodes.forEach(n => {
            defs.append("clipPath")
                .attr("id", "clip-" + n.id)
                .append("rect")
                .attr("width", n.x1 - n.x0)
                .attr("height", Math.max(1, n.y1 - n.y0))
                .attr("rx", 6);
        });

        graph.links.forEach((link, i) => {
            const gradientID = `linkGradient-${i}`;
            const gradient = defs.append("linearGradient").attr("id", gradientID).attr("gradientUnits", "userSpaceOnUse")
                .attr("x1", link.source.x1).attr("x2", link.target.x0);
            gradient.append("stop").attr("offset", "0%").attr("stop-color", simpleColors[link.source.explicitDepth % simpleColors.length]);
            gradient.append("stop").attr("offset", "100%").attr("stop-color", simpleColors[link.target.explicitDepth % simpleColors.length]);
        });

        const linkGroups = svg.append("g")
            .attr("fill", "none")
            .selectAll("g.sankey-link-group").data(graph.links).join("g").attr("class", "sankey-link-group");

        linkGroups.append("path")
            .attr("class", "sankey-link")
            .attr("d", d3.sankeyLinkHorizontal())
            .attr("stroke", (d, i) => `url(#linkGradient-${i})`)
            .attr("stroke-width", d => Math.max(2, d.width));

        const nodeLinkGroups = svg.append("g")
            .selectAll("a.sankey-node-link").data(graph.nodes).join("a")
            .attr("class", "sankey-node-link").attr("xlink:href", d => d.url).attr("target", "_blank")
            .append("g").attr("class", "sankey-node-group").attr("transform", d => `translate(${d.x0},${d.y0})`);

        // Base Rect
        nodeLinkGroups.append("rect")
            .attr("class", "sankey-node")
            .attr("height", d => Math.max(10, d.y1 - d.y0))
            .attr("width", d => d.x1 - d.x0)
            .attr("fill", d => simpleColors[d.explicitDepth % simpleColors.length])
            .attr("rx", 6);

        // Fallback or Active Image
        nodeLinkGroups.append("image")
            .attr("id", d => "img-" + d.id)
            .attr("class", "sankey-node-image")
            .attr("href", d => d.imageUrl || generateNodeSVG(d.name, d.explicitDepth))
            .attr("width", d => d.x1 - d.x0)
            .attr("height", d => Math.max(10, d.y1 - d.y0))
            .attr("preserveAspectRatio", "xMidYMid slice")
            .attr("clip-path", d => `url(#clip-${d.id})`);

        nodeLinkGroups.append("text")
            .attr("class", "sankey-node-label")
            .each(function(d) {
                const text = d3.select(this);
                const nodeWidth = d.x1 - d.x0;
                const nodeHeight = Math.max(10, d.y1 - d.y0);
                
                // Labels alternate side based on depth to prevent overlap
                if (d.explicitDepth < MAX_DEPTH_APP) {
                    text.attr("x", nodeWidth + 10).attr("y", nodeHeight / 2).attr("text-anchor", "start");
                } else {
                    text.attr("x", -10).attr("y", nodeHeight / 2).attr("text-anchor", "end");
                }
            })
            .attr("dy", "0.35em")
            .text(d => d.name.length > 30 ? d.name.substring(0, 27) + "..." : d.name);

        sankeyChartContainerApp.style.display = 'block';
        hideLoadingApp();
    }

    async function handleGenerateDiagramPlaylistApp() {
        if (!currentGraphNodesApp || currentGraphNodesApp.length === 0) return;
        const currentDiagramSignature = currentGraphNodesApp.map(n => n.name).sort().join('||');
        if (cachedPlaylistDataApp && cachedDiagramSignatureApp === currentDiagramSignature) {
            displayPlaylistInModalApp(cachedPlaylistDataApp); return;
        }

        playlistModalTitleApp.textContent = `🎶 Generating Playlist...`;
        playlistModalBodyApp.innerHTML = '<div style="text-align:center; padding: 30px;"><p style="color: #6b7280; margin-bottom: 15px;">Fetching top tracks for mapped artists...</p><div class="spinner" style="border-left-color: #2563eb;"></div></div>';
        playlistModalOverlayApp.classList.add('active');
        generateDiagramPlaylistBtnApp.disabled = true; 

        const trackPromises = currentGraphNodesApp.map(node => fetchArtistTopTrackAPIApp(node.name));
        try {
            const topTracksResponses = await Promise.all(trackPromises);
            const validTracks = topTracksResponses.filter(track => track !== null);

            if (validTracks.length === 0) throw new Error("Could not fetch top tracks.");

            const playlistData = {
                playlistName: "Twisted Sankey Playlist",
                tracks: validTracks.map(track => ({ artistName: track.artist.name, trackName: track.name, trackUrl: track.url }))
            };

            cachedPlaylistDataApp = playlistData;
            cachedDiagramSignatureApp = currentDiagramSignature;
            displayPlaylistInModalApp(playlistData);
        } catch (error) {
            playlistModalTitleApp.textContent = "Error Generating Playlist";
            playlistModalBodyApp.innerHTML = `<p style="color: #c53030;">${error.message}</p>`;
        } finally {
            generateDiagramPlaylistBtnApp.disabled = false;
        }
    }

    function displayPlaylistInModalApp(playlistData) {
        playlistModalTitleApp.textContent = `🎶 ${playlistData.playlistName}`;
        let playlistHtml = "<ul>";
        playlistData.tracks.forEach(track => { playlistHtml += `<li><a href="${track.trackUrl}" target="_blank">${track.trackName}</a> - ${track.artistName}</li>`; });
        playlistHtml += "</ul>";
        playlistModalBodyApp.innerHTML = playlistHtml;
        playlistModalOverlayApp.classList.add('active'); 
        generateDiagramPlaylistBtnApp.disabled = false;
    }

    async function handleSearchApp() {
        const artistName = artistInputApp.value.trim();
        const twist = twistInputApp.value.trim();
        if (!artistName) { showErrorApp('Please enter a starting artist.'); return; }

        let msg = `Branching from "${artistName}"`;
        if(twist) msg += ` with vibe "<span style="color: #c53030;">${twist}</span>"`;
        showLoadingApp(msg);
        
        if(sankeyChartDivApp) sankeyChartDivApp.innerHTML = '';
        currentGraphNodesApp = [];
        cachedPlaylistDataApp = null; 
        cachedDiagramSignatureApp = null;

        try {
            const sankeyData = await generateSankeyDataApp(artistName, twist, MAX_DEPTH_APP);
            drawSankeyD3App(sankeyData);
        } catch (error) {
            showErrorApp(error.message || `Error fetching data for "${artistName}".`);
        }
    }

    if (document.getElementById('artist-input-app')) initializePageApp();

})();
</script>
</body>
</html>
