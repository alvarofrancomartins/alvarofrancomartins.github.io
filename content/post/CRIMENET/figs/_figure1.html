<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #ffffff; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const W = 2400, H = 1500;
const canvas = document.getElementById('c');
canvas.width = W; canvas.height = H;
canvas.style.width = '800px';
canvas.style.height = '500px';
const ctx = canvas.getContext('2d');

const colors = ['#2563eb', '#ea580c', '#16a34a'];

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

const margin = 240;
const sectionW = W - 2 * margin;
const sections = [
  { label: 'EXTRACTION:', sub: 'WIKIPEDIA ARTICLES  →  RAW GRAPH', x: margin, y: 160, h: 290, color: colors[0] },
  { label: 'AUDIT & CORRECTION:', sub: 'FIND AND FIX ERRORS', x: margin, y: 530, h: 290, color: colors[1] },
  { label: 'BUILD & DEPLOY:', sub: 'GENERATE THE STATIC WEB APP', x: margin, y: 900, h: 290, color: colors[2] },
];

const midX = W / 2;

sections.forEach(s => {
  roundRect(s.x, s.y, sectionW, s.h, 20);
  ctx.fillStyle = s.color + '08';
  ctx.fill();
  ctx.strokeStyle = s.color;
  ctx.lineWidth = 3.5;
  ctx.stroke();

  // Label and subtitle on the same line
  ctx.font = 'bold 40px "Oswald", sans-serif';
  ctx.textAlign = 'left';

  // Measure label width to place sub right after it
  const labelW = ctx.measureText(s.label).width;

  ctx.fillStyle = s.color;
  ctx.fillText(s.label, s.x + 40, s.y + 85);

  ctx.font = '26px "Oswald", sans-serif';
  ctx.fillStyle = '#475569';
  ctx.fillText(s.sub, s.x + 40 + labelW + 16, s.y + 85);
});

const extractSteps = [
  { label: '0', sub: 'RESOLVE URLS' },
  { label: '1', sub: 'FETCH ARTICLES' },
  { label: '2', sub: 'EXTRACT NETWORK' },
  { label: '3', sub: 'PROFILE ORGS' },
  { label: '4', sub: 'MERGE & DEDUP' },
];
const auditSteps = [
  { label: '0–5', sub: 'LLM FIND ERRORS' },
  { label: '6', sub: 'LLM REVIEW' },
  { label: '7', sub: 'APPLY CORRECTIONS' },
];
const buildSteps = [
  { label: 'DATA', sub: 'BUILD ALL DATA FILES' },
  { label: 'PAGES', sub: 'GENERATE HTML/CSS' },
  { label: 'DEPLOY', sub: 'PUBLISH TO HOST' },
];

function drawPills(steps, sectionY, color) {
  const y = sectionY + 160;
  const totalW = steps.length * 260 + (steps.length - 1) * 50 + 60 + 20; // + STEPS label + gap
  let x = (W - totalW) / 2;

  // "STEPS" label
  ctx.font = 'bold 24px "Oswald", sans-serif';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#94a3b8';
  ctx.fillText('STEPS', x + 52, y + 50);
  x += 80;

  steps.forEach((s, i) => {
    roundRect(x, y, 260, 95, 14);
    ctx.fillStyle = '#f8fafc';
    ctx.fill();
    ctx.strokeStyle = '#1c1c1c';
    ctx.lineWidth = 2.2;
    ctx.stroke();

    ctx.font = 'bold 44px "Inter", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = color;
    ctx.fillText(s.label, x + 130, y + 46);

    ctx.font = '20px "Oswald", sans-serif';
    ctx.fillStyle = '#1e293b';
    ctx.fillText(s.sub, x + 130, y + 76);

    if (i < steps.length - 1) {
      ctx.beginPath();
      ctx.moveTo(x + 260 + 18, y + 48);
      ctx.lineTo(x + 260 + 35, y + 48);
      ctx.strokeStyle = '#1c1c1c';
      ctx.lineWidth = 2.2;
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + 260 + 26, y + 42);
      ctx.lineTo(x + 260 + 37, y + 48);
      ctx.lineTo(x + 260 + 26, y + 54);
      ctx.fillStyle = '#1c1c1c';
      ctx.fill();
    }

    x += 310;
  });
}

drawPills(extractSteps, sections[0].y, colors[0]);
drawPills(auditSteps, sections[1].y, colors[1]);
drawPills(buildSteps, sections[2].y, colors[2]);

function downArrow(cx, y1, y2) {
  ctx.beginPath();
  ctx.moveTo(cx, y1);
  ctx.lineTo(cx, y2);
  ctx.strokeStyle = '#94a3b8';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx - 14, y2 - 18);
  ctx.lineTo(cx, y2);
  ctx.lineTo(cx + 14, y2 - 18);
  ctx.fillStyle = '#94a3b8';
  ctx.fill();
}

const gap1 = sections[0].y + sections[0].h;
const gap2 = sections[1].y + sections[1].h;
downArrow(midX, gap1 + 10, sections[1].y - 10);
downArrow(midX, gap2 + 10, sections[2].y - 10);

ctx.font = '28px "Oswald", sans-serif';
ctx.textAlign = 'left';
ctx.fillStyle = '#1e293b';
ctx.fillText('crimenet_raw.json', midX + 24, gap1 + 42);
ctx.fillText('crimenet.json', midX + 24, gap2 + 42);
</script>
</body>
</html>
